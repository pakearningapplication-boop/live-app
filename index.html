<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f5f5f5;
}

/* Section Title */
.section-title{
    text-align:center;
    font-size:20px;
    font-weight:bold;
    margin:25px 0 15px;
}

/* Horizontal Scroll */
.horizontal-scroll{
    display:flex;
    gap:15px;
    overflow-x:auto;
    padding:15px;
}

/* Card */
.faucet-card{
    background:#ffffff;
    border-radius:12px;
    text-align:center;
    padding:15px 10px;
    box-shadow:0 3px 10px rgba(0,0,0,0.15);
    cursor:pointer;
    transition:0.2s;
    min-width:120px;
    flex:0 0 120px;
}

.faucet-card:hover{
    transform:scale(1.05);
}

/* Circle */
.logo-circle{
    width:60px;
    height:60px;
    margin:0 auto;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:16px;
    font-weight:bold;
    color:white;
}

/* Name */
.site-name{
    margin-top:8px;
    font-size:12px;
    font-weight:bold;
}

/* Timer */
.timer-box{
    text-align:center;
    font-size:22px;
    font-weight:bold;
    margin-top:20px;
}
</style>

<script>

// ⏱ TIMER SYSTEM
var counter = 10; // yahan seconds change kar sakte ho

function startTimer(){
    var interval = setInterval(function(){
        document.getElementById("timer").innerHTML = counter;
        counter--;

        if(counter < 0){
            clearInterval(interval);

            // MIT App Inventor ko signal bhejna
            window.AppInventor.setWebViewString("open_screen2");
        }

    },1000);
}

// 🟢 Button Click System
function openScreenFromButton(buttonName){
    window.AppInventor.setWebViewString("button_" + buttonName);
}

</script>
</head>

<body onload="startTimer()">

<div class="timer-box">
Timer: <span id="timer">10</span>
</div>

<div class="section-title">Crypto Faucet Sites</div>

<div class="horizontal-scroll">

<div class="faucet-card" onclick="openScreenFromButton('claim')">
    <div class="logo-circle" style="background:#FF5722;">CF</div>
    <div class="site-name">Claim</div>
</div>

<div class="faucet-card" onclick="openScreenFromButton('only')">
    <div class="logo-circle" style="background:#03A9F4;">OF</div>
    <div class="site-name">Only</div>
</div>

<div class="faucet-card" onclick="openScreenFromButton('keran')">
    <div class="logo-circle" style="background:#9C27B0;">KF</div>
    <div class="site-name">Keran</div>
</div>

</div>

<div class="section-title">Watch Live TV</div>

<div class="horizontal-scroll">

<div class="faucet-card" onclick="openScreenFromButton('sports')">
    <div class="logo-circle" style="background:#FF5722;">SP</div>
    <div class="site-name">Sports Tv</div>
</div>

<div class="faucet-card" onclick="openScreenFromButton('cartoon')">
    <div class="logo-circle" style="background:#4CAF50;">CR</div>
    <div class="site-name">Cartoon Tv</div>
</div>

</div>

</body>
</html>
